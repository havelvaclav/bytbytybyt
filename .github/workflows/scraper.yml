name: Automatický Bazoš Bytový Bot

on:
  schedule:
    # Spúšťa sa každé 3 hodiny
    - cron: '0 */3 * * *'
  workflow_dispatch: # Umožní spustiť skript aj ručne jedným klikom

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahnutie kódu z repozitára
        uses: actions/checkout@v4

      - name: Nastavenie Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Inštalácia potrebných knižníc
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 geopy folium

      - name: Spustenie skriptu
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.JOZO }}
        run: python app.py

      - name: Uloženie novej mapy a databázy do repozitára
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add databaza_bytov.json index.html
          git commit -m "Automatická aktualizácia bytov" || exit 0
          git push
